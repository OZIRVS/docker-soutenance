services:
  frontend:
    build:
      context: ./front
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    networks:
      - public_net
  backend:
    build:
      context: ./back
    container_name: backend
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - public_net
      - private_net
  db:
    image: mariadb:10.5
    container_name: mariadb
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    secrets:
      - db_root_password
      - db_password
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - private_net

secrets:
  db_root_password:
    file: ./secrets/db_root_password.secret
  db_password:
    file: ./secrets/db_password.secret

volumes:
  db_data:

networks:
  public_net:
    driver: bridge
  private_net:
    driver: bridge
